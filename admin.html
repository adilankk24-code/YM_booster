document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

peError; }   // fetch ล้มเหลว = ต่อเซิร์ฟเวอร์ไม่ได้\n  _demo2FA(){ try{ return localStorage.getItem('ym_admin_2fa_demo')==='1'; }catch(e){ return false; } }\n\n  storeSession(token, user){ try{ localStorage.setItem('ym_admin_token', token); }catch(e){} this.setState({ authToken:token, authUser:user||null, authStep:'login', loginPassword:'', otpCode:'', tempToken:null, authError:'', authBusy:false }); }\n  logoutAdmin(){ try{ localStorage.removeItem('ym_admin_token'); }catch(e){} this.setState({ authToken:null, authUser:null, authStep:'login', loginEmail:'', loginPassword:'', otpCode:'', authError:'' }); }\n\n  demoLoginAdmin(){ this.storeSession('DEMO-TOKEN', { name:'Admin', email:this.DEMO_ADMIN.email, is_admin:true }); this.toast('เข้าสู่ระบบโหมดทดลอง'); }\n  go(t){ this.setState({tab:t, loading:true}); this._save('ym_admin_tab', t); clearTimeout(this._ld); this._ld=setTimeout(()=>this.setState({loading:false}),420); }\n  askConfirm(o){ this.setState({confirm:o}); }\n  closeConfirm(){ this.setState({confirm:null}); }\n  doConfirm(){ const c=this.state.confirm; this.setState({confirm:null}); if(c&&c.action) c.action(); }\n  openDetail(id){ const o=this.state.orders.find(x=>x.id===id); this.setState({orderDetail:o||null}); }\n  closeDetail(){ this.setState({orderDetail:null}); }\n\n  async doLogin(){\n    if(this.state.authBusy) return;\n    const email = this.state.loginEmail.trim().toLowerCase(), password = this.state.loginPassword;\n    if(!email || !password){ this.setState({authError:'กรุณากรอกอีเมลและรหัสผ่าน'}); return; }\n    this.setState({authBusy:true, authError:''});\n    try {\n      const res = await this.api('/api/auth/login', { email, password });\n      if(res.need2fa) this.setState({ authStep:'otp', tempToken:res.tempToken, authBusy:false, authError:'' });\n      else if(res.user && !res.user.is_admin) this.setState({authBusy:false, authError:'บัญชีนี้ไม่ใช่แอดมิน'});\n      else this.storeSession(res.token, res.user);\n    } catch(e){\n      if(this._netErr(e)){\n        if(email===this.DEMO_ADMIN.email && password===this.DEMO_ADMIN.password){\n          if(this._demo2FA()) this.setState({ authStep:'otp', tempToken:'DEMO', authBusy:false, authError:'' });\n          else this.storeSession('DEMO-TOKEN', { name:'Admin', email, is_admin:true });\n        } else this.setState({authBusy:false, authError:'อีเมลหรือรหัสผ่านไม่ถูกต้อง'});\n      } else this.setState({authBusy:false, authError:e.message});\n    }\n  }\n  async doVerifyOtp(){\n    if(this.state.authBusy) return;\n    const code = this.state.otpCode.trim();\n    if(!/^\\d{6}$/.test(code)){ this.setState({authError:'กรอกรหัส 6 หลัก'}); return; }\n    this.setState({authBusy:true, authError:''});\n    if(this.state.tempToken==='DEMO'){ this.storeSession('DEMO-TOKEN', { name:'Admin', email:this.DEMO_ADMIN.email, is_admin:true }); return; }\n    try { const res = await this.api('/api/auth/2fa/verify', { tempToken:this.state.tempToken, code }); this.storeSession(res.token, res.user); }\n    catch(e){ this.setState({authBusy:false, authError: this._netErr(e)?'ต่อเซิร์ฟเวอร์ไม่ได้':e.message}); }\n  }\n\n  async start2FA(){\n    this.setState({ twoFAStep:'setup', twoFAErr:'', twoFACode:'', twoFAQr:null, twoFASecret:'' });\n    try { const res = await this.api('/api/auth/2fa/setup'); this.setState({ twoFAQr:res.qrDataUrl, twoFASecret:res.secret }); }\n    catch(e){ if(this._netErr(e)) this.setState({ twoFAQr:null, twoFASecret:'DEMO2FAKEY7A9BQ' }); else this.setState({ twoFAErr:e.message, twoFAStep:'idle' }); }\n  }\n  async confirm2FA(){\n    const code = this.state.twoFACode.trim();\n    if(!/^\\d{6}$/.test(code)){ this.setState({twoFAErr:'กรอกรหัส 6 หลัก'}); return; }\n    if(this.state.authToken==='DEMO-TOKEN'){ try{ localStorage.setItem('ym_admin_2fa_demo','1'); }catch(e){} this.setState({ twoFAStep:'idle', twoFACode:'' }); this.toast('เปิด 2FA แล้ว (โหมดตัวอย่าง)'); return; }\n    try { await this.api('/api/auth/2fa/enable', { code }); const me = await t ckground:'+(on?'var(--accent)':'var(--border2)')+';'; }\n  knobStyle(on){ return 'position:absolute;top:3px;left:'+(on?'22px':'3px')+';width:19px;height:19px;border-radius:50%;background:#fff;transition:left .2s;display:block;'; }\n  actBtn(kind){\n    const base='height:32px;padding:0 12px;border-radius:9px;font-size:12.5px;font-weight:600;cursor:pointer;font-family:inherit;white-space:nowrap;';\n    if(kind==='primary') return base+'border:none;background:var(--accent);color:#fff;';\n    if(kind==='good') return base+'border:none;background:#25e0a8;color:#06281d;';\n    if(kind==='ghost') return base+'border:1px solid var(--border2);background:var(--surface);color:var(--muted2);';\n    return base+'border:1px solid var(--border2);background:var(--surface);color:var(--muted3);';\n  }\n\n  rateOf(id, def){ return this.state.rates[id] !== undefined ? this.state.rates[id] : def; }\n  setRate(id, v){ const rates={...this.state.rates, [id]: v}; this.setState({rates}); this._save('ym_rates', rates); clearTimeout(this._rt); this._rt=setTimeout(()=>this.toast('อัปเดตราคาขึ้นหน้าเว็บลูกค้าแล้ว'), 700); }\n  toggleSvc(id){ const off=this.state.svcOff.includes(id); const svcOff= off? this.state.svcOff.filter(x=>x!==id) : [...this.state.svcOff, id]; this.setState({svcOff}); this._save('ym_svcoff', svcOff); this.toast(off?'เปิดบริการแล้ว · แสดงบนหน้าเว็บลูกค้า':'ปิดบริการแล้ว · ซ่อนจากหน้าเว็บลูกค้า'); }\n\n  addCredit(uid){ const u=this.state.users.find(x=>x.id===uid); this.setState({ creditUser: u?{id:u.id,name:u.name}:null, creditAmount:'' }); }\n  doAddCredit(){ const cu=this.state.creditUser; if(!cu) return; const amt=Number(this.state.creditAmount)||0; if(amt<=0){ this.toast('กรอกจำนวนเครดิตก่อน'); return; } const list=this.state.users.map(u=> u.id===cu.id ? {...u, balance:u.balance+amt} : u); const bal=(this._load('ym_balance')||0)+amt; this._save('ym_balance', bal); this.setState({ users:list, creditUser:null, creditAmount:'' }); this.toast('เติม '+this.fmt(amt)+' เครดิ toLowerCase();\n        if(!q) return true;\n        return u.name.toLowerCase().includes(q) || u.email.toLowerCase().includes(q) || u.id.toLowerCase().includes(q);\n      }).map((u,i)=>({\n        name:u.name, email:u.email, joined:u.joined, initial:u.name.replace(/^(คุณ|ร้าน|ช่อง|น้อง)\\s*/,'').charAt(0),\n        balance:this.fmt(u.balance), orders:u.orders, spent:this.fmt(u.spent), banned:u.banned,\n        avatarBg:['linear-gradient(135deg,'+accent+',#25c9e0)','linear-gradient(135deg,#ff5c8a,#ff8a3c)','linear-gradient(135deg,#2f7bff,#25c9e0)','linear-gradient(135deg,#12b981,#25c9e0)','linear-gradient(135deg,#a855f7,#ec4899)'][i%5],\n        onCredit:()=>this.addCredit(u.id), onBan:()=> u.banned ? this.toggleBan(u.id) : this.askConfirm({title:'ระงับบัญชีนี้?', message:'ผู้ใช้จะไม่สามารถสั่งซื้อได้จนกว่าจะปลดระงับ', confirmLabel:'ระงับบัญชี', danger:true, action:()=>this.toggleBan(u.id)}),\n        banLabel: u.banned?'ปลดระงับ':'ระงับ',\n        banStyle:'height:32px;padding:0 12px;border-radius:9px;font-size:12.5px;font-weight:600;cursor:pointer;'+(u.banned?'border:1px solid #25e0a8;background:color-mix(in srgb,#25e0a8 12%,transparent);color:#25e0a8;':'border:1px solid rgba(255,80,100,.35);background:rgba(255,80,100,.08);color:#ff6b7a;'),\n      })),\n\n      // services\n      svcGroups: Object.keys(this.PLATFORMS).map(pf=>({\n        name:this.PLATFORMS[pf].name, logo:this.PLATFORMS[pf].logo, color:this.PLATFORMS[pf].color,\n        items:this.SERVICES[pf].map(s=>{\n          const off=st.svcOff.includes(s.id);\n          return {\n            name:s.name, rate:this.rateOf(s.id, s.rate), minText:this.fmt(s.min), maxText:this.fmt(s.max),\n            dim: off?'opacity:.45;':'',\n            onRate:(e)=>this.setRate(s.id, e.target.value),\n            onToggle:()=>this.toggleSvc(s.id),\n            toggleStyle:this.toggleStyle(!off), knobStyle:this.knobStyle(!off),\n          };\n        }),\n      })),\n\n      // deposits\n      pendingDeposits: st.deposits.map(d=>({ user:d.user, method:d.method, methodImg:d.methodImg, amount:this.fmt(d.amount), time:d.time, slip:d.slip||'', hasSlip:!!d.slip, onApprove:()=>this.approveDeposit(d.id), onReject:()=>this.askConfirm({title:'ปฏิเสธสลิปนี้?', message:'ยอดเติมของ '+d.user+' จะไม่ถูกเพิ่มเข้าระบบ', confirmLabel:'ปฏิเสธสลิป', danger:true, action:()=>this.rejectDeposit(d.id)}) })),\n      pendingDepositCount: st.deposits.length,\n      noPendingDeposits: st.deposits.length===0,\n      depositHistory: st.depositHistory.map(d=>({\n        user:d.user, method:d.method, amount:this.fmt(d.amount), time:d.time,\n        badge: d.auto ? 'อัตโนมัติ' : 'อนุมัติเอง',\n        badgeStyle: 'flex-shrink:0;font-size:10px;font-weight:700;padding:2px 7px;border-radius:6px;'+(d.auto?'color:#25e0a8;background:color-mix(in srgb,#25e0a8 15%,transparent);':'color:var(--muted);background:var(--field);border:1px solid var(--border);'),\n      })),\n      financeSummary: [\n        { label:'รายได้วันนี้', value:'฿'+this.fmt(2250), color:'#25e0a8' },\n        { label:'รายได้สัปดาห์นี้', value:'฿'+this.fmt(12840), color:'var(--text)' },\n        { label:'เติมรอตรวจสอบ', value:'฿'+this.fmt(st.deposits.reduce((a,d)=>a+d.amount,0)), color:'#e0a825' },\n        { label:'เครดิตหมุนเวียน', value:'฿'+this.fmt(st.users.reduce((a,u)=>a+u.balance,0)), color:accent },\n      ],\n\n      // settings\n      paySettings: [\n        { id:'promptpay', name:'พร้อมเพย์ (PromptPay)', desc:'สแกน QR โอนจากทุกธนาคาร', img:'assets/promptpay.png' },\n        { id:'stripe', name:'บัตรเครดิต/เดบิต (Stripe)', desc:'ชำระผ่าน Stripe', img:'assets/stripe.svg' },\n        { id:'truemoney', name:'TrueMoney Wallet', desc:'เติมผ่านวอลเล็ท', img:'assets/truemoney.png' },\n      ].map(p=>{ const on=!st.payOff.includes(p.id); return { name:p.name, desc:p.desc, img:p.img, toggleStyle:this.toggleStyle(on), knobStyle:this.knobStyle(on), onToggle:()=>this.setState(s=>({payOff: on?[...s.payOff,p.id]:s.payOff.filter(x=>x!==p.id)})) }; }),\n      setLine: st.setLine, onSetLine:(e)=>this.setState({setLine:e.target.value}),\n      setEmail: st.setEmail, onSetEmail:(e)=>this.setState({setEmail:e.target.value}),\n      setTmn: st.setTmn, onSetTmn:(e)=>this.setState({setTmn:e.target.value}),\n      saveSettings: ()=>this.toast('บันทึกการตั้งค่าเรียบร้อย'),\n\n      toast: st.toast,\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
